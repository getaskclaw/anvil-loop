<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
  body { margin:0; width:1600px; height:900px; overflow:hidden; background:#f8f4ea; }
  svg { width:1600px; height:900px; display:block; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","Microsoft YaHei",sans-serif; }
  .title { font-size:72px; font-weight:850; fill:#111827; text-anchor:middle; }
  .sub { font-size:34px; font-weight:650; fill:#374151; text-anchor:middle; }
  .node { fill:#eff6ff; stroke:#2563eb; stroke-width:3; filter:url(#shadow); }
  .node-fix { fill:#fff7ed; stroke:#f97316; stroke-width:3; filter:url(#shadow); }
  .node-stop { fill:#ecfdf5; stroke:#16a34a; stroke-width:3; filter:url(#shadow); }
  .diamond { fill:#f5f3ff; stroke:#7c3aed; stroke-width:3; filter:url(#shadow); }
  .txt { font-size:38px; font-weight:800; fill:#111827; text-anchor:middle; dominant-baseline:middle; }
  .small { font-size:31px; font-weight:800; fill:#111827; text-anchor:middle; dominant-baseline:middle; }
  .branch { font-size:30px; font-weight:850; fill:#111827; text-anchor:middle; dominant-baseline:middle; }
  .arrow-blue { stroke:#2563eb; stroke-width:6; fill:none; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrow-blue); }
  .arrow-orange { stroke:#f97316; stroke-width:6; fill:none; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrow-orange); }
  .arrow-green { stroke:#16a34a; stroke-width:6; fill:none; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrow-green); }
</style>
</head>
<body>
<svg viewBox="0 0 1600 900" role="img" aria-label="铁砧循环 Anvil Loop 标准流程图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#dbe4ef" stroke-width="1" opacity="0.55"/>
    </pattern>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#f97316"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#16a34a"/>
    </marker>
    <filter id="shadow" x="-25%" y="-35%" width="150%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <text x="800" y="92" class="title">铁砧循环 Anvil Loop</text>
  <text x="800" y="145" class="sub">有问题就回炉，没问题才停止</text>

  <rect x="90" y="280" width="190" height="96" rx="24" class="node"/>
  <text x="185" y="328" class="txt">需求</text>

  <rect x="350" y="280" width="190" height="96" rx="24" class="node"/>
  <text x="445" y="328" class="txt">实施</text>

  <rect x="610" y="280" width="190" height="96" rx="24" class="node"/>
  <text x="705" y="328" class="txt">验证</text>

  <rect x="870" y="280" width="260" height="96" rx="24" class="node"/>
  <text x="1000" y="328" class="small">独立挑错/复审</text>

  <polygon points="1280,238 1382,328 1280,418 1178,328" class="diamond"/>
  <text x="1280" y="328" class="txt">必须处理？</text>

  <rect x="610" y="570" width="190" height="96" rx="24" class="node-fix"/>
  <text x="705" y="618" class="txt">修复</text>

  <rect x="1400" y="280" width="150" height="96" rx="24" class="node-stop"/>
  <text x="1475" y="328" class="txt">停止</text>

  <line x1="280" y1="328" x2="350" y2="328" class="arrow-blue"/>
  <line x1="540" y1="328" x2="610" y2="328" class="arrow-blue"/>
  <line x1="800" y1="328" x2="870" y2="328" class="arrow-blue"/>
  <line x1="1130" y1="328" x2="1178" y2="328" class="arrow-blue"/>

  <line x1="1382" y1="328" x2="1400" y2="328" class="arrow-green"/>
  <text x="1390" y="285" class="branch">否</text>

  <path d="M1280 418 C1245 520, 1000 618, 800 618" class="arrow-orange"/>
  <text x="1060" y="548" class="branch">是</text>

  <path d="M705 570 L705 382" class="arrow-orange"/>
</svg>
</body>
</html>
